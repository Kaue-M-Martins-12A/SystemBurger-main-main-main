<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger - Admin Produtos</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/js/auth.js" defer></script>
    <script src="/js/admin-produtos.js" defer></script>
</head>
<body class="admin-body">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Burger Place</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item"><span class="icon">🏠</span> Início</a>
            <a href="/admin" class="nav-item"><span class="icon">📊</span> Dashboard</a>
            <a href="/admin/pedidos" class="nav-item"><span class="icon">📦</span> Pedidos</a>
            <a href="/admin/produtos" class="nav-item active"><span class="icon">🍔</span> Produtos</a>
            <a href="/admin/usuarios" class="nav-item"><span class="icon">👥</span> Usuários</a>
        </nav>
    </aside>
    <main class="admin-main">
        <section id="section-produtos" class="admin-section">
            <header class="admin-top-header">
                <div class="header-content">
                    <h1>Gestão dos Produtos</h1>
                </div>
            </header>

            <div class="table-container" style="margin-top:20px; box-shadow:0 0 10px rgba(0,0,0,0.05); border:1px solid #eaeaea; border-radius:8px;">
                <table class="products-table-v2">
                    <thead>
                        <tr>
                            <th width="60">Image</th>
                            <th>Nome</th>
                            <th>Descrição</th>
                            <th>Preço</th>
                            <th>Categoria</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="products-tbody">
                        <!-- Dynamic content -->
                    </tbody>
                </table>
            </div>

            <div id="inline-product-form-container" style="margin-top: 40px; max-width: 600px;">
                <h2 id="form-title" style="margin-bottom:20px; font-size:1.4rem;">Adicionar novo produto</h2>
                <form id="product-form">
                    <input type="hidden" id="product-id">
                    
                    <div style="margin-bottom:15px;">
                        <label style="display:block; margin-bottom:5px; font-weight:500; font-size:0.9rem;">Nome</label>
                        <input type="text" id="p-name" placeholder="Nome do Produto" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;" required>
                    </div>

                    <div style="margin-bottom:15px;">
                        <label style="display:block; margin-bottom:5px; font-weight:500; font-size:0.9rem;">Descrição</label>
                        <textarea id="p-desc" rows="3" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;"></textarea>
                    </div>

                    <div style="margin-bottom:15px;">
                        <label style="display:block; margin-bottom:5px; font-weight:500; font-size:0.9rem;">Preço</label>
                        <input type="number" id="p-price" step="0.01" placeholder="Preço do Produto" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;" required>
                    </div>

                    <div style="margin-bottom:15px;">
                        <label style="display:block; margin-bottom:5px; font-weight:500; font-size:0.9rem;">Categoria</label>
                        <select id="p-category" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;">
                            <option value="" disabled selected>Selecionar Categoria</option>
                            <option value="burgers">Hambúrgueres</option>
                            <option value="acompanhamentos">Acompanhamentos</option>
                            <option value="bebidas">Bebidas</option>
                            <option value="sobremesas">Sobremesas</option>
                            <option value="saladas">Saladas</option>
                            <option value="sanduiches">Sanduíches</option>
                        </select>
                    </div>

                    <div style="margin-bottom:20px;">
                        <label style="display:block; margin-bottom:5px; font-weight:500; font-size:0.9rem;">Image URL</label>
                        <input type="url" id="p-image" placeholder="Image URL" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;">
                    </div>

                    <div style="display:flex; justify-content:flex-end; gap:15px;">
                        <button type="button" onclick="resetForm()" style="background:transparent; border:none; color:#222; font-weight:600; cursor:pointer;">Cancelar</button>
                        <button type="submit" style="background:#e63946; color:#fff; border:none; padding:10px 24px; border-radius:6px; font-weight:600; cursor:pointer;">Salvar</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
