<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger - Carrinho</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/carrinho.css">
    <script src="/js/auth.js" defer></script>
    <script src="/js/cart.js" defer></script>
    <script src="/js/components.js" defer></script>
    <script src="/js/carrinho.js" defer></script>
</head>

<body>
    <header id="main-header"></header>

    <main class="container" style="padding: 60px 20px;">
        <h1 class="profile-title">Meu Carrinho</h1>

        <div id="cart-content">
            <!-- Dynamic content -->
        </div>

        <div id="cart-summary" style="margin-top: 40px; display: none;">
            <div class="summary-total" style="border-top: 2px solid #eee; padding-top: 20px;">
                <span>Total do Pedido</span>
                <span id="cart-total-value">R$ 0,00</span>
            </div>
            <a href="/pagamento" class="btn-primary"
                style="margin-top: 30px; width: 100%; text-align: center;">Continuar para o Pagamento</a>
        </div>
    </main>
    <footer id="main-footer"></footer>
</body>

</html>
