<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger - Meu Perfil</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/js/auth.js" defer></script>
    <script src="/js/cart.js" defer></script>
    <script src="/js/components.js" defer></script>
    <script src="/js/perfil.js" defer></script>
</head>

<body>
    <header id="main-header"></header>

    <main class="container profile-section">
        <h1 class="profile-title">Meu Perfil</h1>

        <div class="profile-info">
            <h2 class="sub-title">Informações Pessoais</h2>

            <div
                style="display: flex; align-items: center; gap: 20px; margin-bottom: 25px; background: #fafafa; padding: 20px; border-radius: 12px; border: 1px solid #eee;">
                <div style="position: relative;">
                    <img id="prof-img-preview"
                        src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-1.2.1&auto=format&fit=crop&w=100&q=80"
                        alt="Preview"
                        style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    <input type="file" id="prof-photo-input" accept="image/*" style="display: none;">
                </div>
                <div>
                    <h3 style="font-size: 1rem; margin-bottom: 5px;">Sua Foto</h3>
                    <button type="button" class="btn-secondary"
                        onclick="document.getElementById('prof-photo-input').click()"
                        style="padding: 8px 15px; font-size: 0.85rem;">Escolher Foto</button>
                    <p style="font-size: 0.75rem; color: #666; margin-top: 5px;">JPG, PNG ou WebP. Máx 400MB.</p>
                </div>
            </div>

            <form class="auth-form" id="profile-form">
                <div>
                    <label class="input-label">Nome</label>
                    <input type="text" id="prof-name" placeholder="Seu nome" class="input-field"
                        style="background-color: white; border: 1px solid #ddd;" required>
                </div>
                <div style="margin-top: 15px;">
                    <label class="input-label">Email</label>
                    <input type="email" id="prof-email" placeholder="Seu email" class="input-field"
                        style="background-color: white; border: 1px solid #ddd;" required>
                </div>
                <div style="margin-top: 15px;">
                    <label class="input-label">Telefone</label>
                    <input type="tel" id="prof-phone" placeholder="Seu telefone" class="input-field"
                        style="background-color: white; border: 1px solid #ddd;">
                </div>
                <div style="margin-top: 15px;">
                    <label class="input-label">Endereço de Entrega</label>
                    <textarea id="prof-address" placeholder="Rua, Número, Bairro, Cidade..." class="input-field"
                        style="background-color: white; border: 1px solid #ddd; height: 80px; resize: none;"></textarea>
                </div>
                <div style="margin-top: 30px; display: flex; gap: 15px;">
                    <button type="submit" class="btn-primary" id="prof-btn">Salvar Alterações</button>
                    <button type="button" class="btn-secondary" onclick="Auth.logout()">Sair da Conta</button>
                </div>
            </form>
        </div>

        <div class="profile-orders">
            <h2 class="sub-title">Histórico de Pedidos</h2>
            <div class="order-history-container">
                <table class="order-history">
                    <thead>
                        <tr>
                            <th>Pedido</th>
                            <th>Data</th>
                            <th>Status</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="orders-tbody">
                        <tr>
                            <td colspan="4">Carregando histórico...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="profile-recommendations" style="margin-top: 40px;">
            <h2 class="sub-title">Recomendações Baseadas nas Suas Compras</h2>
            <div id="recs-container" style="display: flex; gap: 20px; flex-wrap: wrap;">
                Carregando recomendações...
            </div>
        </div>
    </main>
    <footer id="main-footer"></footer>
</body>

</html>
